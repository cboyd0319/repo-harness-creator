name: HarnessForge
description: Create, assess, and safely update AI coding-agent repo harnesses.
author: Chad Boyd

branding:
  icon: check-square
  color: blue

inputs:
  command:
    description: "Command to run: audit, init, update, sync, verify, or doctor."
    required: false
    default: audit
  target:
    description: Repository path to inspect or modify.
    required: false
    default: .
  python-version:
    description: Python version for the action runtime.
    required: false
    default: "3.13.14"
  min-score:
    description: Minimum acceptable audit score from 0 to 100.
    required: false
    default: "85"
  fail-on-score:
    description: Fail when the audit score is below min-score.
    required: false
    default: "true"
  apply:
    description: Apply safe missing-file corrections when command is update.
    required: false
    default: "false"
  force:
    description: Allow overwriting generated files during init or update.
    required: false
    default: "false"
  enhance-existing:
    description: Append reviewed HarnessForge guidance to existing instruction files during init or update.
    required: false
    default: "false"
  agent-file:
    description: Root agent instruction file name to generate.
    required: false
    default: AGENTS.md
  platform-contract:
    description: Generated harness platform contract.
    required: false
    default: cross-platform
  with-ci-workflow:
    description: Also scaffold the optional manual HarnessForge CI workflow for init or update.
    required: false
    default: "false"
  with-self-heal-workflow:
    description: Also scaffold the optional manual self-heal pull-request workflow for init or update.
    required: false
    default: "false"
  verify-run:
    description: Execute verification checks when command is verify. Default verify mode is read-only plan mode.
    required: false
    default: "false"
  verify-command:
    description: Optional newline-separated repo-owned verification commands for command verify.
    required: false
    default: ""
  verify-timeout-seconds:
    description: Per-command timeout in seconds when command is verify and verify-run is true.
    required: false
    default: "300"
  require-verify-evidence:
    description: Require current passed stored verify evidence when command is sync.
    required: false
    default: "false"
  sync-command:
    description: Optional newline-separated repo-owned readiness commands for command sync.
    required: false
    default: ""
  html-report:
    description: Optional target-relative path for an HTML audit report.
    required: false
    default: ""
  json-report:
    description: Optional target-relative path for an audit, sync, or verify JSON report.
    required: false
    default: ""

outputs:
  overall-score:
    description: Harness audit score from 0 to 100.
    value: ${{ steps.harnessforge.outputs.overall-score }}
  bottleneck:
    description: Lowest-scoring harness domain.
    value: ${{ steps.harnessforge.outputs.bottleneck }}
  report-json:
    description: JSON report path when requested.
    value: ${{ steps.harnessforge.outputs.report-json }}
  report-html:
    description: HTML report path when requested.
    value: ${{ steps.harnessforge.outputs.report-html }}
  changed-files:
    description: Number of files written by init or update.
    value: ${{ steps.harnessforge.outputs.changed-files }}
  verify-verdict:
    description: Verify verdict when command is verify.
    value: ${{ steps.harnessforge.outputs.verify-verdict }}
  readiness-verdict:
    description: Readiness verdict when command is sync.
    value: ${{ steps.harnessforge.outputs.readiness-verdict }}
  sync-exit-code:
    description: Sync readiness exit code when command is sync.
    value: ${{ steps.harnessforge.outputs.sync-exit-code }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Run HarnessForge
      id: harnessforge
      shell: bash
      env:
        PYTHONSAFEPATH: "1"
        PYTHONPATH: ${{ github.action_path }}/src
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_MIN_SCORE: ${{ inputs.min-score }}
        INPUT_FAIL_ON_SCORE: ${{ inputs.fail-on-score }}
        INPUT_APPLY: ${{ inputs.apply }}
        INPUT_FORCE: ${{ inputs.force }}
        INPUT_ENHANCE_EXISTING: ${{ inputs.enhance-existing }}
        INPUT_AGENT_FILE: ${{ inputs.agent-file }}
        INPUT_PLATFORM_CONTRACT: ${{ inputs.platform-contract }}
        INPUT_WITH_CI_WORKFLOW: ${{ inputs.with-ci-workflow }}
        INPUT_WITH_SELF_HEAL_WORKFLOW: ${{ inputs.with-self-heal-workflow }}
        INPUT_VERIFY_RUN: ${{ inputs.verify-run }}
        INPUT_VERIFY_COMMAND: ${{ inputs.verify-command }}
        INPUT_VERIFY_TIMEOUT_SECONDS: ${{ inputs.verify-timeout-seconds }}
        INPUT_REQUIRE_VERIFY_EVIDENCE: ${{ inputs.require-verify-evidence }}
        INPUT_SYNC_COMMAND: ${{ inputs.sync-command }}
        INPUT_HTML_REPORT: ${{ inputs.html-report }}
        INPUT_JSON_REPORT: ${{ inputs.json-report }}
      run: python -m harnessforge.github_action
