name: Repo Harness Creator
description: Create, assess, and safely update AI coding-agent repo harnesses.
author: Chad Boyd

branding:
  icon: check-square
  color: blue

inputs:
  command:
    description: "Command to run: audit, init, update, or doctor."
    required: false
    default: audit
  target:
    description: Repository path to inspect or modify.
    required: false
    default: .
  python-version:
    description: Python version for the action runtime.
    required: false
    default: "3.13.14"
  min-score:
    description: Minimum acceptable audit score.
    required: false
    default: "85"
  fail-on-score:
    description: Fail when the audit score is below min-score.
    required: false
    default: "true"
  apply:
    description: Apply safe missing-file corrections when command is update.
    required: false
    default: "false"
  force:
    description: Allow overwriting generated files during init or update.
    required: false
    default: "false"
  agent-file:
    description: Root agent instruction file name to generate.
    required: false
    default: AGENTS.md
  html-report:
    description: Optional target-relative path for an HTML audit report.
    required: false
    default: ""
  json-report:
    description: Optional target-relative path for a JSON audit report.
    required: false
    default: ""

outputs:
  overall-score:
    description: Harness audit score from 0 to 100.
    value: ${{ steps.repo-harness.outputs.overall-score }}
  bottleneck:
    description: Lowest-scoring harness domain.
    value: ${{ steps.repo-harness.outputs.bottleneck }}
  report-json:
    description: JSON report path when requested.
    value: ${{ steps.repo-harness.outputs.report-json }}
  report-html:
    description: HTML report path when requested.
    value: ${{ steps.repo-harness.outputs.report-html }}
  changed-files:
    description: Number of files written by init or update.
    value: ${{ steps.repo-harness.outputs.changed-files }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Run repo harness
      id: repo-harness
      shell: bash
      env:
        PYTHONSAFEPATH: "1"
        PYTHONPATH: ${{ github.action_path }}/src
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_MIN_SCORE: ${{ inputs.min-score }}
        INPUT_FAIL_ON_SCORE: ${{ inputs.fail-on-score }}
        INPUT_APPLY: ${{ inputs.apply }}
        INPUT_FORCE: ${{ inputs.force }}
        INPUT_AGENT_FILE: ${{ inputs.agent-file }}
        INPUT_HTML_REPORT: ${{ inputs.html-report }}
        INPUT_JSON_REPORT: ${{ inputs.json-report }}
      run: python -m repo_harness_creator.github_action
