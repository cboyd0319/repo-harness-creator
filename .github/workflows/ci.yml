name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 3.13.14 on ubuntu-22.04
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13.14"
      - name: Install package
        run: python -m pip install --editable .
      - name: Doctor
        run: python -m harnessforge doctor --strict
      - name: Compile
        run: python -m compileall src tests
      - name: Tests
        run: python -m unittest discover -s tests
      - name: Pin check
        run: python scripts/check_pins.py --root .
      - name: Self audit
        run: python -m harnessforge audit --target . --min-score 85
      - name: GitHub Action smoke
        uses: ./
        with:
          command: audit
          min-score: "85"
          html-report: harness-action-report.html
          json-report: harness-action-report.json

  platform-check:
    if: github.event_name == 'workflow_dispatch'
    name: Manual platform check Python 3.13.14 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - windows-2025-vs2026
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13.14"
      - name: Install package
        run: python -m pip install --editable .
      - name: Doctor
        run: python -m harnessforge doctor --strict
      - name: Compile
        run: python -m compileall src tests
      - name: Tests
        run: python -m unittest discover -s tests
      - name: Pin check
        run: python scripts/check_pins.py --root .
      - name: Self audit
        run: python -m harnessforge audit --target . --min-score 85
      - name: GitHub Action smoke
        uses: ./
        with:
          command: audit
          min-score: "85"
          html-report: harness-action-report.html
          json-report: harness-action-report.json
